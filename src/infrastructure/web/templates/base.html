<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAgent — Health Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --green: #10b981;
            --green-light: #d1fae5;
            --red: #ef4444;
            --red-light: #fee2e2;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, .06), 0 1px 2px rgba(0, 0, 0, .04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, .06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, .08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sticky Top Bar ─────────────────────────── */
        .site-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, .82);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: .75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .site-nav .brand {
            display: flex;
            align-items: center;
            gap: .5rem;
            text-decoration: none;
            color: var(--primary);
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -.02em;
        }

        .site-nav .brand span {
            font-size: 1.3rem;
        }

        .site-nav .nav-links {
            display: flex;
            gap: .35rem;
            flex-wrap: wrap;
        }

        .nav-pill {
            padding: 7px 15px;
            border-radius: 8px;
            font-size: .82rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background .15s, color .15s;
        }

        .nav-pill:hover {
            background: #f1f5f9;
            color: var(--text);
        }

        .nav-pill.active,
        .nav-pill.highlight {
            background: var(--primary);
            color: #fff;
        }

        .nav-pill.highlight-orange {
            background: var(--accent);
            color: #fff;
        }

        .nav-pill.highlight-red {
            background: var(--red);
            color: #fff;
        }

        /* ── Page Shell ─────────────────────────────── */
        .page-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        .content-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 2rem;
            animation: fadeUp .4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Typography ─────────────────────────────── */
        h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1.25rem;
            padding-bottom: .6rem;
            border-bottom: 2px solid var(--primary-light);
            letter-spacing: -.02em;
        }

        /* ── Buttons ────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform .15s, box-shadow .15s, background .15s;
        }

        .btn:active {
            transform: scale(.97);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 14px rgba(99, 102, 241, .35);
        }

        .btn-secondary {
            background: var(--secondary);
            color: #fff;
        }

        .btn-secondary:hover {
            background: #7c3aed;
            box-shadow: 0 4px 14px rgba(139, 92, 246, .35);
        }

        .btn-success {
            background: var(--green);
            color: #fff;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 4px 14px rgba(16, 185, 129, .35);
        }

        /* ── Forms ──────────────────────────────────── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: .4rem;
            font-weight: 600;
            font-size: .85rem;
            color: var(--text-secondary);
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: .92rem;
            color: var(--text);
            background: var(--bg);
            transition: border-color .15s, box-shadow .15s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* ── User Cards (list, detail) ──────────────── */
        .user-list {
            display: grid;
            gap: .8rem;
        }

        .user-card {
            background: var(--bg);
            padding: 1.25rem 1.4rem;
            border-radius: var(--radius);
            border-left: 3px solid var(--primary-light);
            transition: transform .15s, box-shadow .15s;
        }

        .user-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-sm);
        }

        .user-card h3 {
            color: var(--primary);
            font-size: 1rem;
            margin-bottom: .35rem;
        }

        .user-info {
            color: var(--text-secondary);
            margin: .2rem 0;
            font-size: .9rem;
        }

        .user-info strong {
            color: var(--text);
        }

        /* ── States ─────────────────────────────────── */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 36px;
            height: 36px;
            margin: 0 auto 1rem;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .alert {
            padding: .8rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: .9rem;
        }

        .alert-success {
            background: var(--green-light);
            color: #065f46;
            border-left: 3px solid var(--green);
        }

        .alert-error {
            background: var(--red-light);
            color: #7f1d1d;
            border-left: 3px solid var(--red);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: .8rem;
            opacity: .4;
        }

        /* ── Responsive ─────────────────────────────── */
        @media (max-width: 640px) {
            .site-nav {
                padding: .6rem 1rem;
            }

            .page-container {
                padding: 1rem;
            }

            .content-card {
                padding: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <nav class="site-nav">
        <a href="/" class="brand"><span>🧬</span> NutriAgent</a>
        <div class="nav-links">
            <a href="/home" class="nav-pill">Home</a>
            <a href="/" class="nav-pill highlight-orange">🥗 Dashboard</a>
            <a href="/web/rag" class="nav-pill highlight-red">🔍 RAG</a>
        </div>
    </nav>

    <div class="page-container">
        <div class="content-card">
            {% block content %}
            <h2>Bienvenido</h2>
            <p>Seleccioná una opción del menú para comenzar.</p>
            {% endblock %}
        </div>
    </div>
</body>

</html>
